<!DOCTYPE html>
<!--
  video_placeholder.html
  Minimal 5-card placeholder composition for video-studio skeleton.
  1080x1920 vertical. 5 cards x 6s = 30s total.
  This is replaced by LLM-generated HTML in P2; this exists to validate
  the render pipeline end-to-end without depending on prompt quality.

  Render time on this VM: ~130ms/frame at 30fps → 30s ≈ 1.5-2 min.
  60s+ real videos need render timeout bumped to 10+ min in the daemon.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>video placeholder</title>
  <style>
    [data-composition-id="video-placeholder"] {
      width: 1080px;
      height: 1920px;
      background: #0a0e1a;
      color: #fff;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      overflow: hidden;
    }
    .clip {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 32px;
      padding: 120px 80px;
      box-sizing: border-box;
      opacity: 0;
    }
    .card-1 { background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%); }
    .card-2 { background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%); }
    .card-3 { background: linear-gradient(135deg, #ec4899 0%, #f59e0b 100%); }
    .card-4 { background: linear-gradient(135deg, #f59e0b 0%, #10b981 100%); }
    .card-5 { background: linear-gradient(135deg, #10b981 0%, #1e3a8a 100%); }
    .label { font-size: 80px; font-weight: bold; letter-spacing: 4px; text-align: center; }
    .sub { font-size: 56px; opacity: 0.85; text-align: center; }
  </style>
</head>
<body>
  <div data-composition-id="video-placeholder"
       data-width="1080" data-height="1920"
       data-start="0" data-duration="30">
    <div id="card-1" class="clip card-1" data-track-index="0" data-start="0" data-duration="6">
      <div class="label">VIDEO</div>
      <div class="sub">placeholder · card 1</div>
    </div>
    <div id="card-2" class="clip card-2" data-track-index="0" data-start="6" data-duration="6">
      <div class="label">VIDEO</div>
      <div class="sub">placeholder · card 2</div>
    </div>
    <div id="card-3" class="clip card-3" data-track-index="0" data-start="12" data-duration="6">
      <div class="label">VIDEO</div>
      <div class="sub">placeholder · card 3</div>
    </div>
    <div id="card-4" class="clip card-4" data-track-index="0" data-start="18" data-duration="6">
      <div class="label">VIDEO</div>
      <div class="sub">placeholder · card 4</div>
    </div>
    <div id="card-5" class="clip card-5" data-track-index="0" data-start="24" data-duration="6">
      <div class="label">VIDEO</div>
      <div class="sub">placeholder · card 5</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
  <script>
    window.__timelines = window.__timelines || {};
    const tl = gsap.timeline({ paused: true });
    tl.to('#card-1', { opacity: 1, duration: 0.2 }, 0);
    tl.to('#card-1', { opacity: 0, duration: 0.2 }, 6);
    tl.to('#card-2', { opacity: 1, duration: 0.2 }, 6);
    tl.to('#card-2', { opacity: 0, duration: 0.2 }, 12);
    tl.to('#card-3', { opacity: 1, duration: 0.2 }, 12);
    tl.to('#card-3', { opacity: 0, duration: 0.2 }, 18);
    tl.to('#card-4', { opacity: 1, duration: 0.2 }, 18);
    tl.to('#card-4', { opacity: 0, duration: 0.2 }, 24);
    tl.to('#card-5', { opacity: 1, duration: 0.2 }, 24);
    window.__timelines["video-placeholder"] = tl;
  </script>
</body>
</html>
